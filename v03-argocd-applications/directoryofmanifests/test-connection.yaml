apiVersion: batch/v1
kind: Job
metadata:
  name: test-connection
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: curl
          image: curlimages/curl:8.5.0
          command:
            - /bin/sh
            - -c
            - |
              echo "Testing service connectivity..."
              curl -s demo-service.default.svc.cluster.local
